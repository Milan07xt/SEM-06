<!DOCTYPE html>
<html lang="en">
<head>
{% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Face - Admin Panel</title>
    <link rel="icon" href="{% static 'favicon.svg' %}" type="image/svg+xml">
    <link rel="stylesheet" href="{% static 'admin_side/admin_style.css' %}">
</head>
<body>
    <!-- Header -->
    <div class="admin-header">
        <div>
            <h1>⚡ Admin Control Panel</h1>
            <p class="subtitle">Face Detection Attendance System - Administrator Dashboard</p>
        </div>
        <div class="admin-info">
            <div class="username" id="adminUsername">Admin</div>
            <div class="timestamp" id="currentTime"></div>
        </div>
    </div>

    <!-- Navigation Tabs -->
    <div class="admin-nav">
        <button class="nav-tab" onclick="location.href='/admin_dashboard'">📊 Overview</button>
        <button class="nav-tab" onclick="location.href='/admin/mark_attendance'">✓ Mark Attendance</button>
        <button class="nav-tab active">📸 Register Face</button>
        <button class="nav-tab" onclick="location.href='/admin/view_users'">👥 Users</button>
        <button class="nav-tab" onclick="location.href='/admin/records'">📋 Records</button>
        <button class="nav-tab" onclick="location.href='/admin/settings'">⚙️ Settings</button>
    </div>

    <!-- Main Content -->
    <div class="admin-card">
        <h2>📸 Register New User Face</h2>

        <!-- Alert Box -->
        <div id="alertBox" class="alert"></div>

        <!-- Registration Form -->
        <form id="registrationForm" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px;">
            <div class="form-group">
                <label for="fullName">Full Name:</label>
                <input type="text" id="fullName" class="form-control" required placeholder="Enter user's full name">
            </div>

            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" class="form-control" required placeholder="Choose a unique username">
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" class="form-control" required placeholder="Enter a secure password">
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" class="form-control" placeholder="Email address">
            </div>

            <div class="form-group">
                <label for="phone">Phone:</label>
                <input type="tel" id="phone" class="form-control" placeholder="Phone number">
            </div>

            <div class="form-group">
                <label for="rollNumber">Roll Number:</label>
                <input type="text" id="rollNumber" class="form-control" placeholder="Roll/ID number">
            </div>
        </form>

        <!-- Camera Section -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
            <div>
                <h3>📷 Capture Face</h3>
                <video id="cameraFeed" style="width: 100%; border-radius: 8px; background: #000; display: none;"></video>
                <canvas id="captureCanvas" style="display: none;"></canvas>
                <div id="capturePreview" style="border-radius: 8px; overflow: hidden; margin-top: 10px;"></div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                    <button type="button" class="btn btn-secondary" id="startCameraBtn">📷 Start Camera</button>
                    <button type="button" class="btn btn-primary" id="captureBtn" disabled>📸 Capture</button>
                </div>
            </div>

            <div>
                <h3>✓ Preview</h3>
                <div id="previewArea" style="border: 2px dashed #667eea; border-radius: 8px; padding: 20px; text-align: center; color: #94a3b8; min-height: 250px; display: flex; align-items: center; justify-content: center;">
                    Captured image will appear here
                </div>
            </div>
        </div>

        <!-- Submit Button -->
        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn btn-success" id="registerBtn" style="flex: 1;">✓ Register User</button>
            <button type="reset" class="btn btn-secondary" id="resetBtn">Reset Form</button>
        </div>
    </div>

    <!-- Footer Actions -->
    <div class="footer-actions">
        <button class="btn btn-primary" onclick="location.href='/admin_dashboard'">← Back to Home</button>
        <button class="btn btn-danger" onclick="logout()">🔓 Logout</button>
    </div>

    <script>
        let capturedImageData = null;
        let cameraStream = null;

        document.getElementById('adminUsername').textContent = localStorage.getItem('adminUsername') || 'Admin';
        
        function updateTime() {
            document.getElementById('currentTime').textContent = new Date().toLocaleString();
        }
        updateTime();
        setInterval(updateTime, 1000);
        
        function logout() {
            if(confirm('Are you sure?')) {
                localStorage.removeItem('adminUsername');
                location.href = '/admin_login';
            }
        }

        // Camera functionality
        document.getElementById('startCameraBtn').addEventListener('click', async () => {
            try {
                const video = document.getElementById('cameraFeed');
                cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = cameraStream;
                video.style.display = 'block';
                document.getElementById('startCameraBtn').textContent = '⏹️ Stop Camera';
                document.getElementById('captureBtn').disabled = false;
            } catch(err) {
                alert('Camera access denied: ' + err.message);
            }
        });

        document.getElementById('captureBtn').addEventListener('click', () => {
            const video = document.getElementById('cameraFeed');
            const canvas = document.getElementById('captureCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            capturedImageData = canvas.toDataURL('image/jpeg');
            document.getElementById('previewArea').innerHTML = `<img src="${capturedImageData}" style="max-width: 100%; border-radius: 8px;">`;
        });

        document.getElementById('registerBtn').addEventListener('click', async () => {
            if(!capturedImageData) {
                alert('Please capture a face image first');
                return;
            }
            const fullName = document.getElementById('fullName').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if(!fullName || !username || !password) {
                alert('Please fill in all required fields');
                return;
            }
            try {
                const response = await fetch('/api/register_face', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: fullName,
                        username: username,
                        password: password,
                        email: document.getElementById('email').value,
                        phone: document.getElementById('phone').value,
                        roll_number: document.getElementById('rollNumber').value,
                        image: capturedImageData
                    })
                });
                const result = await response.json();
                if(result.success) {
                    document.getElementById('alertBox').innerHTML = '<div class="alert alert-success show">✓ User registered successfully!</div>';
                    document.getElementById('registrationForm').reset();
                    document.getElementById('previewArea').innerHTML = 'Captured image will appear here';
                    capturedImageData = null;
                } else {
                    document.getElementById('alertBox').innerHTML = '<div class="alert alert-error show">✗ Error: ' + result.message + '</div>';
                }
            } catch(err) {
                document.getElementById('alertBox').innerHTML = '<div class="alert alert-error show">✗ Error registering user</div>';
            }
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            if(cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                document.getElementById('cameraFeed').style.display = 'none';
                document.getElementById('startCameraBtn').textContent = '📷 Start Camera';
                document.getElementById('captureBtn').disabled = true;
            }
            capturedImageData = null;
        });
    </script>
    {% include 'includes/footer.html' %}
</body>
</html>
