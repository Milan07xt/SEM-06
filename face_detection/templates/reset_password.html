<!DOCTYPE html>
<html lang="en">
<head>
{% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Face Attendance System</title>
    <link rel="icon" href="{% static 'favicon.svg' %}" type="image/svg+xml">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/navbar.css' %}">
    <link rel="stylesheet" href="{% static 'css/user_login.css' %}">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">
                <img class="brand-icon" src="{% static 'img/brand-logo.svg' %}" alt="Face Detection Logo">
                <span class="brand-text">Face Detection Attendance System</span>
            </div>
            <div class="navbar-menu">
                <a href="/" class="nav-link">Home</a>
                <a href="/login" class="nav-link">Login</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <main>
            <div class="content">
                <section class="login-section">
                    <div class="login-container">
                        <div class="login-header">
                            <h2>🔐 Reset Password</h2>
                            <p>Set your new password</p>
                        </div>

                        <form id="resetPasswordForm" class="login-form">
                            <div class="form-group">
                                <label for="newPassword">New Password:</label>
                                <input type="password" id="newPassword" class="form-control" placeholder="At least 8 chars, with upper/lower/number" required>
                            </div>

                            <div class="form-group">
                                <label for="confirmPassword">Confirm Password:</label>
                                <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter password" required>
                            </div>

                            <button type="submit" id="resetBtn" class="btn btn-primary login-btn">Reset Password</button>
                            <div id="resetStatus" class="status-message"></div>
                        </form>

                        <div class="register-prompt">
                            <p>Back to <a href="/user_login">User Login</a></p>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
        const resetForm = document.getElementById('resetPasswordForm');
        const resetStatus = document.getElementById('resetStatus');
        const resetBtn = document.getElementById('resetBtn');

        function getTokenFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return (params.get('token') || '').trim();
        }

        function showStatus(message, type) {
            resetStatus.textContent = message;
            resetStatus.className = 'status-message show ' + type;
            if (type !== 'info') {
                setTimeout(() => resetStatus.classList.remove('show'), 5000);
            }
        }

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const token = getTokenFromUrl();
            const newPassword = document.getElementById('newPassword').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();

            if (!token) {
                showStatus('Invalid reset link. Please request a new one.', 'error');
                return;
            }

            if (!newPassword || !confirmPassword) {
                showStatus('Please fill all fields.', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showStatus('Passwords do not match.', 'error');
                return;
            }

            resetBtn.disabled = true;
            showStatus('Resetting password...', 'info');

            try {
                const response = await fetch('/api/reset_password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token,
                        new_password: newPassword,
                        confirm_password: confirmPassword
                    })
                });

                const result = await response.json();
                if (!result.success) {
                    showStatus(result.message || 'Failed to reset password.', 'error');
                    resetBtn.disabled = false;
                    return;
                }

                showStatus('✅ Password reset successful. Redirecting to login...', 'success');
                setTimeout(() => {
                    window.location.href = '/user_login';
                }, 1200);
            } catch (error) {
                console.error('Reset password error:', error);
                showStatus('Connection error. Please try again.', 'error');
                resetBtn.disabled = false;
            }
        });
    </script>
    {% include 'includes/footer.html' %}
</body>
</html>
