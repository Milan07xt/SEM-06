<!DOCTYPE html>
<html lang="en">
<head>
{% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - Face Attendance System</title>
    <link rel="icon" href="{% static 'favicon.svg' %}" type="image/svg+xml">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/user_login.css' %}">
</head>
<body class="future-ui">
    <div class="container">
   

        <main>
            <div class="content new-style-container">
                <section class="login-section">
                    <div class="login-container">
                        <span class="card-light-sweep" aria-hidden="true"></span>
                        <div class="login-header">
                            <h2>👤 User Login</h2>
                            <p>Access your attendance dashboard</p>
                        </div>

                        <form id="userLoginForm" class="login-form">
                            <div class="form-group">
                                <label for="loginUsername">Username:</label>
                                <input type="text" id="loginUsername" class="form-control" placeholder="Enter your username" required autocomplete="username">
                            </div>

                            <div class="form-group">
                                <label for="loginPassword">Password:</label>
                                <div class="password-input-wrapper">
                                    <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
                                    <button type="button" id="togglePassword" class="toggle-password" aria-label="Toggle password visibility">
                                        👁️
                                    </button>
                                </div>
                            </div>

                            <div class="form-options">
                                <label class="checkbox-label">
                                    <input type="checkbox" id="rememberMe" required>
                                    <span>Remember me</span>
                                </label>
                                <a href="/forgot_password" class="forgot-password-link">Forgot Password?</a>
                            </div>

                            <button type="submit" id="loginBtn" class="btn btn-primary login-btn">
                                <span class="btn-text">Login</span>
                                <span class="btn-loader" style="display: none;">⏳</span>
                            </button>

                            <div id="loginStatus" class="status-message"></div>
                        </form>

                        <div class="register-prompt">
                            <p>Don't have an account? <a href="/register">Register here</a></p>
                        </div>

                        <div class="alternative-login">
                            <div class="divider">
                                <span>OR</span>
                            </div>
                            <a href="/login_with_face_recognition/" class="btn btn-secondary face-login-btn">
                                📸 Login with Face Recognition
                            </a>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="{% static 'js/user_login.js' %}"></script>
    
</body>
</html>
