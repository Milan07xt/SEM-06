<!DOCTYPE html>
<html lang="en">
<head>
{% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Face Attendance System</title>
    <link rel="icon" href="{% static 'favicon.svg' %}" type="image/svg+xml">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>
    <div class="login-wrapper">
        <!-- Login Type Selection Screen -->
        <div class="login-container" id="loginTypeSelection">
            <div class="login-header">
                <div class="logo">
                    <div class="logo-icon">👤</div>
                    <h1>Face Attendance System</h1>
                </div>
                <h2>Welcome Back</h2>
                <p>Please select your login type</p>
            </div>

            <div class="login-type-cards">
                <div class="login-type-card user-card" onclick="showLoginForm('user')">
                    <div class="card-icon">👥</div>
                    <h3>User Login</h3>
                    <p>Login as a student or employee</p>
                    <div class="card-arrow">→</div>
                </div>

                <div class="login-type-card admin-card" onclick="showLoginForm('admin')">
                    <div class="card-icon">🔑</div>
                    <h3>Admin Login</h3>
                    <p>Login as administrator</p>
                    <div class="card-arrow">→</div>
                </div>
            </div>

            <div class="quick-access">
                <a href="/login_with_face_recognition/" class="quick-link">
                    <span>📸</span>
                    Mark Attendance Without Login
                </a>
            </div>
        </div>

      

        <div class="background-animation">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
        </div>
    </div>

    <script src="{% static 'js/login.js' %}"></script>
    {% include 'includes/footer.html' %}
</body>
</html>
